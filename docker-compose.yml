version: '3'

services:
  gpt4free:
    shm_size: 2gb
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - gpt4free_data:/app
    ports:
      - '${PORT_1}'
      - '${PORT_2}'
      - '${PORT_3}'
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}

volumes:
  gpt4free_data:
